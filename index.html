<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程進度管理系統</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="工程管理">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;font-size:17px}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit}
.topbar{background:#1e293b;color:#fff;padding:0 28px;height:64px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar-logo{font-size:24px}.topbar-title{font-size:19px;font-weight:700}.topbar-sub{font-size:14px;color:#94a3b8;margin-left:4px}.spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;border-radius:9px;font-size:15px;font-weight:500;transition:all .15s;cursor:pointer;border:none;line-height:1}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#059669;color:#fff}.btn-success:hover{background:#047857}
.btn-secondary{background:#fff;color:#374151;border:1.5px solid #e2e8f0}.btn-secondary:hover{background:#f8fafc}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.btn-danger:hover{background:#fee2e2}
.btn-ghost{color:#64748b;padding:7px 12px;border-radius:8px}.btn-ghost:hover{background:#f1f5f9;color:#1e293b}
.btn-purple{background:#7c3aed;color:#fff}.btn-purple:hover{background:#6d28d9}
.btn-sm{padding:6px 13px;font-size:13px}
.btn-icon{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px}

/* Dashboard layout */
.dash-layout{max-width:1600px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 480px;gap:24px;align-items:start}
.content{max-width:1100px;margin:0 auto;padding:24px 20px}
.btn-sm{padding:7px 15px;font-size:13px}
.btn-icon{width:36px;height:36px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px}

/* Calendar */
.cal-wrap{background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;overflow:hidden;margin-bottom:20px}
.cal-header{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid #f1f5f9;background:#fafafa;gap:8px}
.cal-title{font-size:16px;font-weight:700;flex:1;color:#1e293b}
.cal-nav{background:transparent;border:none;cursor:pointer;color:#64748b;font-size:18px;padding:4px 10px;border-radius:6px}
.cal-nav:hover{background:#f1f5f9}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);min-width:0}
.cal-dow{font-size:12px;font-weight:700;color:#94a3b8;text-align:center;padding:7px 0;background:#fafafa;border-bottom:1px solid #f1f5f9}
.cal-day{min-height:78px;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;padding:3px;position:relative;vertical-align:top;min-width:0;overflow:hidden}
.cal-day:nth-child(7n){border-right:none}
.cal-day-num{font-size:12px;font-weight:600;color:#475569;margin-bottom:2px;padding:1px 3px}
.cal-day.today .cal-day-num{background:#2563eb;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px}
.cal-day.other-month .cal-day-num{color:#cbd5e1}
.cal-day.other-month{background:#fafafa}
.cal-event{font-size:10px;font-weight:600;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.6;display:block}

/* Sections */
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:13px 18px;border-radius:12px;cursor:pointer;transition:background .15s;user-select:none}
.section-header:hover{background:rgba(0,0,0,.03)}
.section-icon{font-size:20px}.section-title{font-size:17px;font-weight:700;flex:1}.section-count{font-size:14px;font-weight:600;padding:3px 11px;border-radius:99px}.section-arrow{font-size:14px;color:#94a3b8;transition:transform .2s}.section-arrow.open{transform:rotate(90deg)}
.sec-planned .section-header{background:#fefce8;border:1.5px solid #fde68a}.sec-planned .section-title{color:#92400e}.sec-planned .section-count{background:#fde68a;color:#78350f}
.sec-active .section-header{background:#eff6ff;border:1.5px solid #bfdbfe}.sec-active .section-title{color:#1e40af}.sec-active .section-count{background:#bfdbfe;color:#1e3a8a}
.sec-done .section-header{background:#f0fdf4;border:1.5px solid #bbf7d0}.sec-done .section-title{color:#14532d}.sec-done .section-count{background:#bbf7d0;color:#14532d}
.section-body{margin-bottom:20px}

/* Project cards */
.planned-grid,.done-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;padding:0 4px}
.planned-card{background:#fff;border:1.5px solid #fde68a;border-radius:12px;padding:16px;cursor:pointer;transition:all .15s}
.planned-card:hover{border-color:#f59e0b;box-shadow:0 4px 12px rgba(245,158,11,.15)}
.active-list{display:flex;flex-direction:column;gap:12px;padding:0 4px}
.active-card{background:#fff;border:2px solid #3b82f6;border-radius:14px;padding:18px;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(59,130,246,.08)}
.active-card:hover{border-color:#2563eb;box-shadow:0 4px 16px rgba(59,130,246,.15)}
.done-card{background:#fff;border:1.5px solid #bbf7d0;border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;opacity:.85}
.done-card:hover{border-color:#22c55e;opacity:1}
.card-name{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:5px}
.card-meta{font-size:13px;color:#64748b;margin-bottom:2px}
.card-meta.hl{color:#7c3aed;font-weight:600;font-size:13px}
.card-del{background:transparent;border:none;cursor:pointer;color:#94a3b8;font-size:15px;padding:2px;border-radius:4px;line-height:1;transition:color .15s}
.card-del:hover{color:#ef4444}
.progress-bar{height:9px;background:#e2e8f0;border-radius:99px;overflow:hidden;flex:1}
.progress-fill{height:100%;border-radius:99px;background:#3b82f6;transition:width .4s}
.progress-fill.full{background:#16a34a}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap}
.badge-blue{background:#dbeafe;color:#1d4ed8}.badge-green{background:#dcfce7;color:#15803d}.badge-yellow{background:#fef9c3;color:#854d0e}.badge-gray{background:#f1f5f9;color:#64748b}.badge-purple{background:#ede9fe;color:#6d28d9}
.empty-mini{text-align:center;padding:26px;color:#94a3b8;font-size:14px;background:#f8fafc;border-radius:10px;border:1.5px dashed #e2e8f0}

/* Stats */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-box{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px 18px}
.stat-val{font-size:22px;font-weight:800;color:#1e293b}.stat-lbl{font-size:12px;color:#64748b;margin-top:3px;font-weight:500}

/* Task table */
.task-table{width:100%;border-collapse:collapse}
.task-table th{font-size:12px;font-weight:700;color:#64748b;text-align:left;padding:10px 12px;border-bottom:2px solid #e2e8f0;background:#f8fafc;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.task-table td{padding:0;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.task-table tbody tr:hover{background:#f8fafc}
.task-table tbody tr.drag-over{background:#eff6ff;outline:2px dashed #3b82f6;outline-offset:-2px}
.task-table tbody tr.done-row{opacity:.6}
.task-cell{padding:10px 12px}
.task-name{font-size:14px;font-weight:600;color:#1e293b}
.drag-handle{color:#cbd5e1;font-size:15px;user-select:none;cursor:grab;padding:10px 8px;display:block}
.drag-handle:active{cursor:grabbing}
.status-select{font-size:13px;padding:5px 8px;border-radius:7px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#475569;cursor:pointer;min-width:90px}
.status-select:focus{outline:none;border-color:#3b82f6}

/* Form */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:14px;font-weight:600;color:#374151;margin-bottom:5px}
.form-input{width:100%;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:15px;transition:border-color .15s;color:#1e293b;background:#fff}
.form-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
textarea.form-input{resize:vertical;min-height:90px}
.form-error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;color:#dc2626;font-size:14px;margin-bottom:12px}
.section-lbl{font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;margin:12px 0 7px}

/* Edit-tasks modal task row */
.etask-row{display:flex;align-items:center;gap:7px;padding:9px 11px;border-bottom:1px solid #f1f5f9;background:#fff;min-height:46px}
.etask-row:last-child{border-bottom:none}
.etask-row.drag-over-row{background:#eff6ff}
.date-mini{font-size:13px;padding:4px 7px;border:1.5px solid #d1d5db;border-radius:6px;color:#1e293b;background:#fff;width:112px}
.date-mini:focus{outline:none;border-color:#3b82f6}
.dur-mini{font-size:13px;padding:4px 7px;border:1.5px solid #d1d5db;border-radius:6px;color:#1e293b;background:#fff;width:54px;text-align:center}
.dur-mini:focus{outline:none;border-color:#3b82f6}
.mode-toggle{display:flex;align-items:center;gap:3px;font-size:11px;background:#f1f5f9;border-radius:6px;padding:2px;flex-shrink:0}
.mode-btn{font-size:11px;padding:2px 7px;border-radius:4px;cursor:pointer;border:none;background:transparent;color:#64748b;font-weight:500;white-space:nowrap}
.mode-btn.active{background:#fff;color:#2563eb;box-shadow:0 1px 2px rgba(0,0,0,.1);font-weight:600}
.task-list-box{border:1.5px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:10px}
.add-row{display:flex;gap:8px;align-items:center;padding:9px 11px;background:#f8fafc;border-top:1.5px solid #e2e8f0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:28px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modal-lg{max-width:720px}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px}
.modal-title{font-size:16px;font-weight:700;flex:1;color:#1e293b}
.modal-body{padding:20px 22px;max-height:70vh;overflow-y:auto}
.modal-footer{padding:14px 22px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px}
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.dialog{background:#fff;border-radius:14px;padding:24px;max-width:340px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.dialog-title{font-size:16px;font-weight:700;margin-bottom:8px;color:#1e293b}
.dialog-msg{font-size:15px;color:#64748b;margin-bottom:20px;line-height:1.7}
.dialog-actions{display:flex;justify-content:flex-end;gap:10px}

/* Report */
.report-item{padding:11px 13px;background:#f8fafc;border-radius:8px;border:1.5px solid #e2e8f0;cursor:pointer;margin-bottom:7px;transition:all .12s}
.report-item:hover{background:#f1f5f9;border-color:#cbd5e1}
.report-title{font-size:14px;font-weight:600;color:#1e293b}
.report-meta{font-size:12px;color:#94a3b8;margin-top:2px}
.report-content{font-size:13px;color:#64748b;margin-top:3px;line-height:1.5}

/* AI */
.ai-box{background:linear-gradient(135deg,#ede9fe,#dbeafe);border:1.5px solid #c4b5fd;border-radius:14px;padding:20px;margin-bottom:18px}
.ai-result{background:#fff;border-radius:10px;padding:16px;font-size:14px;line-height:1.85;color:#1e293b;white-space:pre-wrap;border:1px solid #e9d5ff}
.ai-loading{display:flex;align-items:center;gap:10px;color:#6d28d9;font-size:14px;padding:12px 0}

/* Equip sidebar */
.equip-sidebar{background:#fff;border:1.5px solid #fecdd3;border-radius:14px;overflow:hidden;margin-top:16px}
.equip-sidebar-header{background:#fff1f5;padding:13px 16px;border-bottom:1.5px solid #fecdd3;display:flex;align-items:center;gap:8px}
.equip-sidebar-title{font-size:15px;font-weight:700;color:#9f1239;flex:1}
.equip-section-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;padding:7px 13px 3px;background:#fafafa;border-bottom:1px solid #f1f5f9}
.equip-item{padding:10px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:background .1s}
.equip-item:hover{background:#f8fafc}
.equip-item:last-child{border-bottom:none}
.equip-check{width:16px;height:16px;border:2px solid #d1d5db;border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff}
.equip-check.checked{background:#059669;border-color:#059669}
.equip-check.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.equip-info{flex:1;min-width:0}
.equip-name{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:2px}
.equip-date{font-size:12px;color:#64748b;line-height:1.5}
.equip-urgent{color:#dc2626;font-weight:600}.equip-warning{color:#d97706;font-weight:600}
.equip-ordered-date{font-size:12px;color:#059669;font-weight:500}
.equip-sidebar-body{max-height:260px;overflow-y:auto}
.equip-detail-box{background:#fff;border:1.5px solid #fecdd3;border-radius:12px;padding:18px;margin-bottom:18px}

/* Material / Contact rows */
.mat-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;margin-bottom:5px}
.contact-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #f1f5f9}

.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:38px;height:38px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:#64748b;font-weight:500}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:11px 22px;border-radius:9px;font-size:15px;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:900px){.dash-layout{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.stat-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>
<script>
// Gemini 分析已移至 GAS 後端，前端不再持有 API Key

// ── GAS Web App URL ─────────────────────────────────
var GAS_URL='https://script.google.com/macros/s/AKfycbxJdwVe6XYu6WsiUBX_awsIcRtp2_sz7YM392gCTNUZrpCKARHPuhWieA4WHSDBz02X/exec';

function callGAS(action,payload){
  return fetch(GAS_URL+'?action='+encodeURIComponent(action)+'&payload='+encodeURIComponent(JSON.stringify(payload||{})),{
    method:'GET',
    mode:'cors'
  }).then(function(r){return r.json();});
}

// ── PWA Service Worker 註冊 ──────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js').catch(function(e){console.log('SW 註冊失敗:',e);});
  });
}

// 12 顏色給不同案場
var PROJECT_COLORS=['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1','#14b8a6','#e11d48'];

var state={
  projects:[],view:'dashboard',selectedId:null,
  modal:null,modalData:{},loading:false,
  sections:{planned:true,active:true,done:false},
  contacts:[],
  calYear:new Date().getFullYear(),
  calMonth:new Date().getMonth()
};

var DEFAULT_TASKS=[
  {id:'t1', name:'圍籬進場',     dur:2, active:true},
  {id:'t1b',name:'點交日',       dur:1, active:true},
  {id:'t2', name:'拆除工程',     dur:2, active:true},
  {id:'t3', name:'水電工程',     dur:5, active:true},
  {id:'t4', name:'泥作工程',     dur:3, active:false},
  {id:'t5', name:'木工工程',     dur:5, active:true},
  {id:'t6', name:'油漆工程',     dur:3, active:false},
  {id:'t7', name:'設備進場安裝', dur:3, active:true}
];

// ── 日期工具 ─────────────────────────────────────
function skipWknd(s){var d=new Date(s);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];}
function addDays(s,n,aw){
  var d=new Date(s);if(!aw)while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);
  var i=0;while(i<n-1){d.setDate(d.getDate()+1);if(aw||(d.getDay()!==0&&d.getDay()!==6))i++;}
  return d.toISOString().split('T')[0];
}
function nextWork(s,aw){var d=new Date(s);d.setDate(d.getDate()+1);if(!aw)while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];}
function fmt(s){if(!s)return'—';var p=s.split('-');return p[1]+'/'+p[2];}
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}
function todayStr(){return new Date().toISOString().split('T')[0];}
function isFuture(s){return s&&s>todayStr();}
function daysDiff(a,b){return Math.round((new Date(a)-new Date(b))/(86400000));}
function ymd(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}

// 重新串接天數模式的工程（跳過 isDateBased 的）
function recalcFrom(tasks,aw,anchor){
  var cur=anchor;
  return tasks.map(function(t){
    if(t.isDateBased)return t;
    if(!cur)cur=t.startDate||todayStr();
    if(aw===false)cur=skipWknd(cur);
    var end=addDays(cur,t.duration||1,aw);
    var r=Object.assign({},t,{startDate:cur,endDate:end});
    cur=nextWork(end,aw);
    return r;
  });
}

// 正式開幕日期永遠排最後，其他依 endDate 排序
function sortByEnd(tasks){
  var last=tasks.filter(function(t){return t.name==='正式開幕日期';});
  var rest=tasks.filter(function(t){return t.name!=='正式開幕日期';});
  rest.sort(function(a,b){var ae=a.endDate||'',be=b.endDate||'';return ae>be?1:ae<be?-1:0;});
  return rest.concat(last);
}

// 叫貨
function getEquipTask(p){return(p.tasks||[]).find(function(t){return t.name==='設備進場安裝';});}
function getEquipInstall(p){var t=getEquipTask(p);return t?t.startDate:null;}
function getEquipOrder(p){var d=getEquipInstall(p);if(!d)return null;var dt=new Date(d);dt.setDate(dt.getDate()-42);return dt.toISOString().split('T')[0];}
function equipStatus(p){
  if(p.status==='completed')return null;
  if(p.equipOrdered)return'ordered';
  var od=getEquipOrder(p);if(!od)return null;
  var diff=daysDiff(od,todayStr());
  return diff<0?'urgent':diff<=7?'warning':'pending';
}

// 案場分類
function doneCount(tasks){return(tasks||[]).filter(function(t){return t.status==='done';}).length;}
function reportCount(tasks){return(tasks||[]).reduce(function(s,t){return s+(t.reports?t.reports.length:0);},0);}
function totalProgress(tasks){if(!tasks||!tasks.length)return 0;return Math.round(doneCount(tasks)/tasks.length*100);}
function statusLabel(s){return{pending:'待開始',active:'進行中',done:'完成',paused:'暫停'}[s]||s;}
function statusBadgeClass(s){return{pending:'badge-gray',active:'badge-blue',done:'badge-green',paused:'badge-yellow'}[s]||'badge-gray';}
function projCat(p){if(p.status==='completed')return'done';return isFuture(p.tasks&&p.tasks[0]?p.tasks[0].startDate:'')?'planned':'active';}

// 依正式開幕日排序
function sortByOpening(list){
  return list.slice().sort(function(a,b){
    var ao=a.openingDate||'9999',bo=b.openingDate||'9999';
    return ao>bo?1:ao<bo?-1:0;
  });
}

// 取案場縮名（前2字）
function shortName(p){return p.name.slice(0,4);}

// 取案場顏色
function projColor(p){
  var idx=state.projects.indexOf(p);
  if(idx<0)idx=state.projects.findIndex(function(x){return x.id===p.id;});
  return PROJECT_COLORS[idx%PROJECT_COLORS.length]||'#3b82f6';
}

function qs(sel){return document.querySelector(sel);}
function qsa(sel){return Array.from(document.querySelectorAll(sel));}
function on(sel,evt,fn){var el=qs(sel);if(el)el.addEventListener(evt,fn);}
function onAll(sel,evt,fn){qsa(sel).forEach(function(el){el.addEventListener(evt,fn);});}
function setState(patch){Object.assign(state,patch);render();}
function showLoading(msg){setState({loading:msg||'處理中…'});}
function hideLoading(){setState({loading:false});}
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2400);}

// ── Calendar ─────────────────────────────────────
function renderCalendar(){
  var y=state.calYear,m=state.calMonth;
  var today=todayStr();
  var firstDay=new Date(y,m,1).getDay(); // 0=Sun
  var days=daysInMonth(y,m);
  var prevDays=daysInMonth(y,m-1);

  // 蒐集當月所有工程事件
  // events[dateStr] = [{name, color, taskName}]
  var events={};
  state.projects.forEach(function(p){
    var color=projColor(p);
    var sn=shortName(p);
    (p.tasks||[]).forEach(function(t){
      if(!t.startDate||!t.endDate)return;
      var cur=new Date(t.startDate);
      var end=new Date(t.endDate);
      while(cur<=end){
        var ds=cur.toISOString().split('T')[0];
        var dm=parseInt(ds.split('-')[1])-1;
        if(dm===m){
          if(!events[ds])events[ds]=[];
          events[ds].push({label:sn+'-'+t.name.slice(0,4),color:color,pid:p.id});
        }
        cur.setDate(cur.getDate()+1);
      }
    });
  });

  var monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var dowNames=['日','一','二','三','四','五','六'];

  var dows=dowNames.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('');

  var cells='';
  // 前補空格
  for(var i=0;i<firstDay;i++){
    var pd=prevDays-firstDay+i+1;
    cells+='<div class="cal-day other-month"><div class="cal-day-num">'+pd+'</div></div>';
  }
  for(var d=1;d<=days;d++){
    var ds=ymd(y,m,d);
    var isToday=ds===today;
    var evs=events[ds]||[];
    var evHtml=evs.slice(0,3).map(function(e){
      return '<div class="cal-event" style="background:'+e.color+'22;color:'+e.color+';border-left:2px solid '+e.color+'" data-pid="'+e.pid+'" title="'+e.label+'">'+e.label+'</div>';
    }).join('');
    if(evs.length>3)evHtml+='<div style="font-size:9px;color:#94a3b8">+'+( evs.length-3)+' 更多</div>';
    cells+='<div class="cal-day'+(isToday?' today':'')+'"><div class="cal-day-num">'+d+'</div>'+evHtml+'</div>';
  }
  // 補尾
  var total=firstDay+days;var remain=(7-total%7)%7;
  for(var i=1;i<=remain;i++){cells+='<div class="cal-day other-month"><div class="cal-day-num">'+i+'</div></div>';}

  return '<div class="cal-wrap">'
    +'<div class="cal-header">'
    +'<button class="cal-nav" id="calPrev">‹</button>'
    +'<span class="cal-title">'+y+' 年 '+monthNames[m]+'</span>'
    +'<button class="cal-nav" id="calNext">›</button>'
    +'</div>'
    +'<div class="cal-grid">'+dows+cells+'</div>'
    +'</div>';
}

// ── Equip sidebar ─────────────────────────────────
function renderEquipSidebar(){
  var nonDone=state.projects.filter(function(p){return projCat(p)!=='done';});
  var ordered=nonDone.filter(function(p){return equipStatus(p)==='ordered';});
  var urgent =nonDone.filter(function(p){return equipStatus(p)==='urgent';});
  var warning =nonDone.filter(function(p){return equipStatus(p)==='warning';});
  var pending =nonDone.filter(function(p){return equipStatus(p)==='pending';});
  pending.sort(function(a,b){var ae=a.tasks&&a.tasks.length?a.tasks[a.tasks.length-1].endDate:'',be=b.tasks&&b.tasks.length?b.tasks[b.tasks.length-1].endDate:'';return ae>be?1:ae<be?-1:0;});
  function card(p,st){
    var od=getEquipOrder(p),ins=getEquipInstall(p);
    var diff=od?daysDiff(od,todayStr()):null;
    var isOrdered=st==='ordered';
    return '<div class="equip-item" data-pid="'+p.id+'">'
      +'<div class="equip-check'+(isOrdered?' checked':'')+'" onclick="event.stopPropagation();toggleOrdered(\''+p.id+'\')" title="標記叫貨"></div>'
      +'<div class="equip-info"><div class="equip-name">'+p.name+'</div>'
      +(isOrdered?'<div class="equip-ordered-date">✓ 已叫貨'+(p.equipOrderedDate?' · '+p.equipOrderedDate:'')+'</div>'
        :'<div class="equip-date">'+(ins?'📦 '+ins+'<br>':'')
          +(od?'🛒 <span class="'+(st==='urgent'?'equip-urgent':st==='warning'?'equip-warning':'')+'">'
            +od+(diff!==null?(diff<0?' (過'+Math.abs(diff)+'天)':diff===0?' (今天)':' (剩'+diff+'天)'):'')+'</span>':'')
          +'</div>')
      +'</div></div>';
  }
  var body='';
  if(urgent.length||warning.length){body+='<div class="equip-section-label">🔴 需叫貨 ('+(urgent.length+warning.length)+')</div>';urgent.forEach(function(p){body+=card(p,'urgent');});warning.forEach(function(p){body+=card(p,'warning');});}
  if(pending.length){body+='<div class="equip-section-label">📋 未叫貨 ('+pending.length+'，依完工日)</div>';pending.forEach(function(p){body+=card(p,'pending');});}
  if(ordered.length){body+='<div class="equip-section-label">✅ 已叫貨 ('+ordered.length+')</div>';ordered.forEach(function(p){body+=card(p,'ordered');});}
  if(!body)body='<div class="empty-mini" style="margin:10px;font-size:12px">目前沒有叫貨提醒</div>';
  var uc=urgent.length,wc=warning.length;
  return '<div class="equip-sidebar">'
    +'<div class="equip-sidebar-header"><span style="font-size:17px">📦</span><span class="equip-sidebar-title">設備叫貨提醒</span>'
    +(uc?'<span class="badge" style="background:#fee2e2;color:#dc2626;font-size:11px">🔴'+uc+'</span>':'')
    +(wc?'<span class="badge badge-yellow" style="font-size:11px">🟡'+wc+'</span>':'')
    +'</div><div class="equip-sidebar-body">'+body+'</div></div>';
}

    +'</div>';

  var rightCol='<div style="position:sticky;top:76px">'+renderCalendar()+renderEquipSidebar()+'</div>';

// 日期連動：選完 A，若 B 為空或早於 A，自動設 B = A
function linkedDate(el,targetId){
  if(!targetId)return;
  var target=document.getElementById(targetId);
  if(!target)return;
  if(!target.value||target.value<el.value)target.value=el.value;
  if(state.modalData){
    var m={'pStartWork':'startWorkDate','pOpeningDate':'openingDate','pFenceDate':'fenceDate'};
    if(m[el.id])state.modalData[m[el.id]]=el.value;
    if(m[targetId]&&target.value)state.modalData[m[targetId]]=target.value;
  }
}

// ── Edit Tasks Modal（集中管理）─────────────────
function renderEditTasksModal(){
  var p=state.projects.find(function(x){return x.id===state.selectedId;});if(!p)return'';
  var md=state.modalData;
  var tasks=md.editTasks||p.tasks.slice();
  var aw=p.allowWeekend!==false;
  var anchorDate=p.startWorkDate||null;

  // 先計算天數模式的預覽日期（方便顯示）
  var previewTasks=recalcFrom(tasks,aw,anchorDate||(tasks[0]&&tasks[0].startDate)||todayStr());

  var existNames=tasks.map(function(t){return t.name;});
  var missing=DEFAULT_TASKS.filter(function(t){return!existNames.includes(t.name);});

  // 排序警告（若儲存後會因 endDate 重排）
  var orderWarning=md.orderWarning||'';

  var taskRows=tasks.map(function(t,i){
    var useDate=t.isDateBased||false;
    // 天數模式：從預覽結果取得計算後日期

    var previewDateStr=(!useDate&&prev.startDate&&prev.endDate)
      ?'<span style="font-size:10px;color:#94a3b8;margin-left:4px">'+fmt(prev.startDate)+'~'+fmt(prev.endDate)+'</span>'
      :'';
    return '<div class="etask-row" draggable="true" data-eidx="'+i+'">'
      +'<span class="drag-handle" style="font-size:13px;padding:5px">⠿</span>'
      +'<span style="font-size:12px;font-weight:600;min-width:72px;flex-shrink:0;color:#374151">'+t.name+'</span>'
      +'<div class="mode-toggle"><button class="mode-btn'+(useDate?'':' active')+' e-mode-dur" data-eidx="'+i+'">天數</button><button class="mode-btn'+(useDate?' active':'')+' e-mode-date" data-eidx="'+i+'">日期</button></div>'
      +(useDate
        // 日期模式：始末日期輸入，結束日期連動
        ?'<input type="date" class="date-mini e-start" data-eidx="'+i+'" value="'+(t.startDate||'')+'" style="width:100px">'
          +'<span style="color:#94a3b8;font-size:10px">→</span>'
          +'<input type="date" class="date-mini e-end" data-eidx="'+i+'" value="'+(t.endDate||'')+'" style="width:100px">'
        // 天數模式：天數輸入 + 預覽日期
        :'<input type="number" min="1" class="dur-mini e-dur" data-eidx="'+i+'" value="'+(t.duration||1)+'"><span style="font-size:11px;color:#94a3b8">天</span>'
          +previewDateStr

  }).join('');

  var missingHtml=missing.length?'<div style="margin-bottom:12px"><div class="form-label" style="font-size:12px;margin-bottom:6px">快速加入預設工程：</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+missing.map(function(t){return '<button class="btn btn-secondary btn-sm e-quick-add" data-name="'+t.name+'" data-dur="'+(t.dur||1)+'" style="font-size:11px;padding:4px 9px">＋ '+t.name+'</button>';}).join('')+'</div></div>':'';

  return '<div class="modal-overlay" id="modalOverlay"><div class="modal modal-lg">'
    +'<div class="modal-header"><span class="modal-title">✏️ 工程項目管理</span><button class="btn btn-ghost btn-icon" id="modalClose">✕</button></div>'
    +'<div class="modal-body">'
    +missingHtml
    +(orderWarning?'<div style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:9px 13px;color:#854d0e;font-size:12px;margin-bottom:10px">⚠️ '+orderWarning+'</div>':'')
    +'<div style="font-size:12px;color:#64748b;margin-bottom:8px;line-height:1.6">• 拖曳 ⠿ 調整順序。天數模式從案場開工日自動串接（灰色為預覽日期）。<br>• 日期模式填固定日期，不被自動重算；儲存時若結束日期造成順序不一致，系統會自動調整並提示。</div>'

    +'<div class="add-row"><input class="form-input" id="eCustomName" placeholder="新增自訂工程名稱" style="flex:1;font-size:12px;padding:5px 9px"><input type="number" min="1" class="dur-mini" id="eCustomDur" value="1"><span style="font-size:11px;color:#94a3b8">天</span><button class="btn btn-secondary btn-sm" id="eBtnAddCustom" style="font-size:12px">＋ 加入</button></div>'

// 結束日期連動（編輯工程用）
function syncEEnd(startInput,idx){
  var val=startInput.value;if(!val)return;
  var endInput=document.querySelector('.e-end[data-eidx="'+idx+'"]');
  if(endInput&&(!endInput.value||endInput.value<val))endInput.value=val;
  if(state.modalData.editTasks){
    state.modalData.editTasks=state.modalData.editTasks.map(function(t,i){
      if(i!==idx)return t;
      var newEnd=t.endDate&&t.endDate>=val?t.endDate:val;
      return Object.assign({},t,{startDate:val,endDate:newEnd});
    });
  }
}

  document.getElementById('modalRoot').innerHTML=mhtml;
  var lo=document.getElementById('loadingOverlay');
  if(state.loading){if(!lo){lo=document.createElement('div');lo.id='loadingOverlay';lo.className='loading-overlay';document.body.appendChild(lo);}lo.innerHTML='<div class="spinner"></div><div class="loading-text">'+state.loading+'</div>';}else if(lo)lo.remove();
  bindEvents();
}

// ── Events ───────────────────────────────────────
function bindEvents(){
  on('#secTogglePlanned','click',function(){setState({sections:Object.assign({},state.sections,{planned:!state.sections.planned})});});
  on('#secToggleActive','click',function(){setState({sections:Object.assign({},state.sections,{active:!state.sections.active})});});
  on('#secToggleDone','click',function(){setState({sections:Object.assign({},state.sections,{done:!state.sections.done})});});
  on('#calPrev','click',function(){var m=state.calMonth-1,y=state.calYear;if(m<0){m=11;y--;}setState({calMonth:m,calYear:y});});
  on('#calNext','click',function(){var m=state.calMonth+1,y=state.calYear;if(m>11){m=0;y++;}setState({calMonth:m,calYear:y});});

  on('#btnContacts','click',function(){setState({modal:'contacts',modalData:{}});});
  on('#btnNew','click',function(){setState({modal:'newProject',modalData:{formError:''}});});

  onAll('.planned-card,.active-card,.done-card','click',function(e){if(e.target.closest('.card-del'))return;var pid=e.currentTarget.dataset.pid;if(pid)setState({view:'detail',selectedId:pid});});
  onAll('.del-project','click',function(e){e.stopPropagation();doDeleteProject(e.currentTarget.dataset.pid);});
  onAll('.equip-item','click',function(e){if(e.target.closest('.equip-check'))return;var pid=e.currentTarget.dataset.pid;if(pid)setState({view:'detail',selectedId:pid});});
  onAll('.cal-event','click',function(e){var pid=e.currentTarget.dataset.pid;if(pid)setState({view:'detail',selectedId:pid});});

  on('#btnBack','click',function(){setState({view:'dashboard',selectedId:null});});
  on('#btnDelProject','click',function(){doDeleteProject(state.selectedId);});
  on('#btnDelProject2','click',function(){doDeleteProject(state.selectedId);});
  on('#btnCloseProject','click',function(){
    var p=getProject();
    setState({modal:'confirm',modalData:{msg:'確定要將「'+p.name+'」結案嗎？',onConfirm:function(){closeModal();var upd=Object.assign({},p,{status:'completed'});updateLocalProject(upd);saveProjectToGAS(upd);showToast('已結案 ✓');}}});
  });
  on('#btnRunAI','click',function(){
    var p=getProject();if(!p)return;
    var loadEl=qs('#aiLoading'),resEl=qs('#aiResult');
    if(loadEl)loadEl.style.display='flex';if(resEl)resEl.style.display='none';
    // 呼叫 GAS 後端執行 Gemini 分析（API Key 在後端，不暴露）
    callGAS('geminiAnalysis',p).then(function(result){
      var text=result&&result.text?result.text:'分析失敗，請重試';
      if(result&&result.success&&result.text){
        var upd=Object.assign({},p,{aiAnalysis:result.text});
        updateLocalProject(upd);saveProjectToGAS(upd);
      }
      if(loadEl)loadEl.style.display='none';
      if(resEl){resEl.style.display='block';resEl.textContent=text;}
    }).catch(function(){
      if(loadEl)loadEl.style.display='none';
      if(resEl){resEl.style.display='block';resEl.textContent='分析失敗，請重試。';}
    });
  });

  // 開工日、開幕日、圍籬日即時儲存（日期連動）
  on('#editStartWork','change',function(e){
    var p=getProject();if(!p)return;
    // 連動：若開幕日早於開工日，自動調整
    var od=qs('#editOpeningDate');if(od&&od.value&&od.value<e.target.value)od.value=e.target.value;
    var upd=Object.assign({},p,{startWorkDate:e.target.value||null,openingDate:od&&od.value?od.value:p.openingDate});
    updateLocalProject(upd);saveProjectToGAS(upd);showToast('開工日已更新 ✓');
  });
  on('#editOpeningDate','change',function(e){
    var p=getProject();if(!p)return;
    // 連動：不能早於開工日
    var sw=qs('#editStartWork');if(sw&&sw.value&&e.target.value<sw.value)e.target.value=sw.value;
    var upd=Object.assign({},p,{openingDate:e.target.value||null});
    updateLocalProject(upd);saveProjectToGAS(upd);showToast('正式開幕日已更新 ✓');
  });
  on('#editFenceDate','change',function(e){
    var p=getProject();if(!p)return;
    var upd=Object.assign({},p,{fenceDate:e.target.value||null});
    updateLocalProject(upd);saveProjectToGAS(upd);showToast('圍籬進場日已更新 ✓');
  });
  on('#allowWeekendSelect','change',function(e){
    var p=getProject();if(!p)return;var val=e.target.value==='true';
    setState({modal:'confirm',modalData:{msg:'修改排程基準將重新計算所有工程日期，確定嗎？',onConfirm:function(){
      closeModal();var newTasks=recalcFrom(p.tasks,val,p.tasks[0]&&p.tasks[0].startDate);
      var upd=Object.assign({},p,{allowWeekend:val,tasks:newTasks});updateLocalProject(upd);saveProjectToGAS(upd);showToast('排程已更新 ✓');
    }}});
  });

  onAll('.task-status','change',function(e){
    var tid=e.target.dataset.tid,val=e.target.value;var p=getProject();if(!p)return;
    var upd=Object.assign({},p,{tasks:p.tasks.map(function(t){return t.id===tid?Object.assign({},t,{status:val}):t;})});
    updateLocalProject(upd);saveProjectToGAS(upd);
  });

  // 開啟 Edit Tasks Modal
  on('#btnEditTasks','click',function(){
    var p=getProject();if(!p)return;
    setState({modal:'editTasks',modalData:{editTasks:p.tasks.map(function(t){return Object.assign({},t);})}});
  });

  // Edit Tasks Modal 事件
  // 天數/日期切換
  onAll('.e-mode-date','click',function(e){
    var idx=parseInt(e.currentTarget.dataset.eidx);
    if(state.modalData.editTasks)state.modalData.editTasks=state.modalData.editTasks.map(function(t,i){return i===idx?Object.assign({},t,{isDateBased:true}):t;});
    render();
  });
  onAll('.e-mode-dur','click',function(e){
    var idx=parseInt(e.currentTarget.dataset.eidx);
    if(state.modalData.editTasks)state.modalData.editTasks=state.modalData.editTasks.map(function(t,i){return i===idx?Object.assign({},t,{isDateBased:false}):t;});
    render();
  });
  // 刪除工程
  onAll('.e-del','click',function(e){
    var idx=parseInt(e.currentTarget.dataset.eidx);
    if(state.modalData.editTasks)state.modalData.editTasks=state.modalData.editTasks.filter(function(_,i){return i!==idx;});
    render();
  });
  // 天數輸入：即時更新，預覽日期重算
  onAll('.e-dur','input',function(e){
    var idx=parseInt(e.target.dataset.eidx),val=parseInt(e.target.value);
    if(val>=1&&state.modalData.editTasks){
      state.modalData.editTasks=state.modalData.editTasks.map(function(t,i){return i===idx?Object.assign({},t,{duration:val}):t;});
      render();
    }
  });
  // 日期輸入：始↔末連動 + 自動算天數
  onAll('.e-start','input',function(e){
    var idx=parseInt(e.target.dataset.eidx),val=e.target.value;
    if(!state.modalData.editTasks)return;
    state.modalData.editTasks=state.modalData.editTasks.map(function(t,i){
      if(i!==idx)return t;
      var newEnd=t.endDate&&t.endDate>=val?t.endDate:val;
      var dur=newEnd?Math.max(1,daysDiff(newEnd,val)+1):(t.duration||1);
      return Object.assign({},t,{startDate:val,endDate:newEnd,duration:dur});
    });
    var task=state.modalData.editTasks[idx];
    var endInput=document.querySelector('.e-end[data-eidx="'+idx+'"]');
    if(endInput&&task)endInput.value=task.endDate||'';
    render();
  });
  onAll('.e-end','input',function(e){
    var idx=parseInt(e.target.dataset.eidx),val=e.target.value;
    if(!state.modalData.editTasks)return;
    state.modalData.editTasks=state.modalData.editTasks.map(function(t,i){
      if(i!==idx)return t;
      var newEnd=t.startDate&&val<t.startDate?t.startDate:val;
      var dur=t.startDate&&newEnd?Math.max(1,daysDiff(newEnd,t.startDate)+1):(t.duration||1);
      return Object.assign({},t,{endDate:newEnd,duration:dur});
    });
    render();
  });
  // 快速加入預設工程
  onAll('.e-quick-add','click',function(e){
    var name=e.currentTarget.dataset.name,dur=parseInt(e.currentTarget.dataset.dur)||1;
    var newTask={id:uid(),name:name,duration:dur,startDate:'',endDate:'',status:'pending',reports:[],contacts:[],materials:[],isDateBased:false};
    if(state.modalData.editTasks)state.modalData.editTasks=state.modalData.editTasks.concat([newTask]);
    render();
  });
  // 自訂新增
  on('#eBtnAddCustom','click',function(){
    var name=qs('#eCustomName')&&qs('#eCustomName').value.trim();
    var dur=parseInt(qs('#eCustomDur')&&qs('#eCustomDur').value)||1;
    if(!name)return;
    var newTask={id:uid(),name:name,duration:dur,startDate:'',endDate:'',status:'pending',reports:[],contacts:[],materials:[],isDateBased:false};
    if(state.modalData.editTasks)state.modalData.editTasks=state.modalData.editTasks.concat([newTask]);
    render();
  });
  on('#eCustomName','keydown',function(e){if(e.key==='Enter'){var b=qs('#eBtnAddCustom');if(b)b.click();}});

  // 拖曳排序（Edit Tasks Modal）
  var eDragIdx=null;
  onAll('#editTaskList .etask-row','dragstart',function(e){eDragIdx=parseInt(e.currentTarget.dataset.eidx);e.dataTransfer.effectAllowed='move';});
  onAll('#editTaskList .etask-row','dragover',function(e){e.preventDefault();});
  onAll('#editTaskList .etask-row','dragenter',function(e){e.currentTarget.classList.add('drag-over-row');});
  onAll('#editTaskList .etask-row','dragleave',function(e){e.currentTarget.classList.remove('drag-over-row');});
  onAll('#editTaskList .etask-row','drop',function(e){
    e.currentTarget.classList.remove('drag-over-row');
    var overIdx=parseInt(e.currentTarget.dataset.eidx);
    if(eDragIdx===null||eDragIdx===overIdx)return;
    var arr=state.modalData.editTasks.slice();
    var item=arr.splice(eDragIdx,1)[0];arr.splice(overIdx,0,item);
    state.modalData.editTasks=arr;render();eDragIdx=null;
  });

  // 儲存排程：天數模式從案場開工日自動串接，日期模式保持固定；儲存後依 endDate 排序，若順序有變則提示
  on('#btnSaveEditTasks','click',function(){
    var p=getProject();if(!p)return;
    var tasks=state.modalData.editTasks||[];
    var aw=p.allowWeekend!==false;
    var anchorDate=p.startWorkDate||null;
    // 先串接天數模式的工程
    var computed=anchorDate
      ?recalcFrom(tasks,aw,anchorDate)
      :(function(){var f=null;for(var i=0;i<tasks.length;i++){if(tasks[i].startDate){f=tasks[i].startDate;break;}}return f?recalcFrom(tasks,aw,f):tasks;})();
    // 排序前後比較
    var beforeOrder=computed.map(function(t){return t.id;}).join(',');
    var sorted=sortByEnd(computed.slice());
    var afterOrder=sorted.map(function(t){return t.id;}).join(',');
    var reordered=(beforeOrder!==afterOrder);
    var upd=Object.assign({},p,{tasks:sorted});
    if(reordered){
      // 先更新，關 Modal，然後顯示排序警告
      closeModal();updateLocalProject(upd);saveProjectToGAS(upd);
      showToast('工程排程已儲存，順序已依結束日期自動調整 ✓');
    } else {
      closeModal();updateLocalProject(upd);saveProjectToGAS(upd);showToast('工程排程已儲存 ✓');
    }
  });

  // Detail drag（工程表格中的拖曳）
  var dragIdx=null;
  onAll('.task-drag-row','dragstart',function(e){dragIdx=parseInt(e.currentTarget.dataset.idx);});
  onAll('.task-drag-row','dragover',function(e){e.preventDefault();});
  onAll('.task-drag-row','dragenter',function(e){e.currentTarget.classList.add('drag-over');});
  onAll('.task-drag-row','dragleave',function(e){e.currentTarget.classList.remove('drag-over');});
  onAll('.task-drag-row','drop',function(e){
    e.currentTarget.classList.remove('drag-over');
    var overIdx=parseInt(e.currentTarget.dataset.idx);
    if(dragIdx===null||dragIdx===overIdx)return;
    var p=getProject();var arr=p.tasks.slice();
    var item=arr.splice(dragIdx,1)[0];arr.splice(overIdx,0,item);
    var anchor=arr.findIndex(function(t){return t.isAnchor;});
    var anchorDate=anchor>=0?p.startWorkDate:arr[0]&&arr[0].startDate;
    var newTasks=recalcFrom(arr,p.allowWeekend,anchorDate||arr[0]&&arr[0].startDate);
    var upd=Object.assign({},p,{tasks:newTasks});updateLocalProject(upd);saveProjectToGAS(upd);dragIdx=null;showToast('排序已更新 ✓');
  });

  // Modal 共用
  on('#modalClose','click',closeModal);on('#modalClose2','click',closeModal);on('#modalCancel','click',closeModal);
  on('#modalOverlay','click',function(e){if(e.target.id==='modalOverlay')closeModal();});
  on('#modalConfirm','click',function(){if(state.modalData.onConfirm)state.modalData.onConfirm();});

  // 建立案場
  on('#pName','input',function(e){state.modalData.name=e.target.value;});
  on('#pStartWork','input',function(e){state.modalData.startWorkDate=e.target.value;});
  on('#pOpeningDate','input',function(e){state.modalData.openingDate=e.target.value;});
  on('#pFenceDate','input',function(e){state.modalData.fenceDate=e.target.value;});
  on('#pWeekend','change',function(e){state.modalData.weekend=e.target.checked;});

  on('#modalSubmit','click',function(){
    var name=qs('#pName')&&qs('#pName').value.trim();
    if(!name){state.modalData.formError='請填寫案場名稱';render();return;}
    var aw=qs('#pWeekend')?qs('#pWeekend').checked:(state.modalData.weekend!==false);
    var np={id:uid(),name:name,allowWeekend:aw,tasks:[],status:'active',createdAt:new Date().toISOString(),
      startWorkDate:qs('#pStartWork')&&qs('#pStartWork').value||null,
      openingDate:qs('#pOpeningDate')&&qs('#pOpeningDate').value||null,
      fenceDate:qs('#pFenceDate')&&qs('#pFenceDate').value||null
    };
    state.modalData.formError='';closeModal();showLoading('建立案場中…');
    callGAS('createProject',np).then(function(){setState({projects:state.projects.concat([np])});hideLoading();showToast('案場已建立 ✓');}).catch(function(e){hideLoading();showToast('建立失敗');console.error(e);});
  });

  // Report
  on('#btnAddReport','click',function(){setState({modal:'report',modalData:Object.assign({},state.modalData,{subview:'add'})});});
  on('#reportBack','click',function(){setState({modal:'report',modalData:Object.assign({},state.modalData,{subview:'list',viewId:null})});});
  on('#reportBack2','click',function(){setState({modal:'report',modalData:Object.assign({},state.modalData,{subview:'list',viewId:null})});});
  on('#btnSaveReport','click',function(){
    var title=qs('#rTitle')&&qs('#rTitle').value.trim(),content=qs('#rContent')&&qs('#rContent').value.trim();
    if(!title||!content){showToast('請填寫標題與內容');return;}
    var report={id:uid(),taskId:state.modalData.task.id,projectId:state.selectedId,date:qs('#rDate')&&qs('#rDate').value,title:title,content:content,reporter:(qs('#rReporter')&&qs('#rReporter').value.trim())||''};
    showLoading('儲存中…');
    callGAS('addReport',report).then(function(){
      var p=getProject();var newTasks=p.tasks.map(function(t){return t.id===report.taskId?Object.assign({},t,{reports:(t.reports||[]).concat([report])}):t;});
      var upd=Object.assign({},p,{tasks:newTasks});var updTask=newTasks.find(function(t){return t.id===report.taskId;});
      updateLocalProject(upd);hideLoading();setState({modal:'report',modalData:{task:updTask,subview:'list'}});showToast('已儲存 ✓');
    }).catch(function(e){hideLoading();showToast('儲存失敗');console.error(e);});
  });
  onAll('.report-item','click',function(e){setState({modal:'report',modalData:Object.assign({},state.modalData,{subview:'view',viewId:e.currentTarget.dataset.rid})});});
  on('#btnDelReport','click',function(e){
    var rid=e.currentTarget.dataset.rid,tid=state.modalData.task.id;showLoading('刪除中…');
    callGAS('deleteReport',{id:rid}).then(function(){
      var p=getProject();var newTasks=p.tasks.map(function(t){return t.id===tid?Object.assign({},t,{reports:(t.reports||[]).filter(function(r){return r.id!==rid;})}):t;});
      var upd=Object.assign({},p,{tasks:newTasks});var updTask=newTasks.find(function(t){return t.id===tid;});
      updateLocalProject(upd);hideLoading();setState({modal:'report',modalData:{task:updTask,subview:'list',viewId:null}});showToast('已刪除');
    }).catch(function(e){hideLoading();showToast('刪除失敗');});
  });

  // Contacts
  on('#btnSaveContact','click',function(){
    var name=qs('#cNewName')&&qs('#cNewName').value.trim(),phone=qs('#cNewPhone')&&qs('#cNewPhone').value.trim(),taskScope=qs('#cNewTaskScope')&&qs('#cNewTaskScope').value.trim();
    if(!name){showToast('請填寫姓名');return;}
    var editId=qs('#btnSaveContact')&&qs('#btnSaveContact').dataset.editId;
    var c={id:editId||uid(),name:name,phone:phone||'',taskScope:taskScope||''};
    showLoading('儲存中…');
    callGAS('saveContact',c).then(function(){
      var exists=state.contacts.find(function(x){return x.id===c.id;});
      if(exists)state.contacts=state.contacts.map(function(x){return x.id===c.id?c:x;});else state.contacts=state.contacts.concat([c]);
      hideLoading();showToast('已儲存 ✓');setState({modal:'contacts',modalData:{}});
    }).catch(function(){hideLoading();showToast('儲存失敗');});
  });
  onAll('.btn-edit-contact','click',function(e){setState({modal:'contacts',modalData:{editContactId:e.currentTarget.dataset.cid}});});
  onAll('.btn-del-contact','click',function(e){
    var cid=e.currentTarget.dataset.cid,c=state.contacts.find(function(x){return x.id===cid;});
    setState({modal:'confirm',modalData:{msg:'確定要刪除「'+(c?c.name:'')+'」？',onConfirm:function(){
      closeModal();showLoading('刪除中…');
      callGAS('deleteContact',{id:cid}).then(function(){state.contacts=state.contacts.filter(function(x){return x.id!==cid;});hideLoading();showToast('已刪除');setState({modal:'contacts',modalData:{}});}).catch(function(){hideLoading();showToast('刪除失敗');});
    }}});
  });
  on('#btnCancelEditContact','click',function(){setState({modal:'contacts',modalData:{}});});

  onAll('.btn-task-contacts','click',function(e){setState({modal:'taskContacts',modalData:{taskId:e.currentTarget.dataset.tid}});});
  on('#btnAddExistingContact','click',function(){
    var sel=qs('#tcSelectExisting');if(!sel||!sel.value)return;
    var c=state.contacts.find(function(x){return x.id===sel.value;});if(!c)return;
    var p=getProject(),tid=state.modalData.taskId;
    var upd=Object.assign({},p,{tasks:p.tasks.map(function(t){return t.id!==tid?t:Object.assign({},t,{contacts:(t.contacts||[]).concat([{id:c.id,name:c.name,phone:c.phone}])});})});
    updateLocalProject(upd);saveProjectToGAS(upd);setState({modal:'taskContacts',modalData:{taskId:tid}});showToast('已加入 ✓');
  });
  on('#btnAddNewContact','click',function(){
    var name=qs('#tcNewName')&&qs('#tcNewName').value.trim(),phone=qs('#tcNewPhone')&&qs('#tcNewPhone').value.trim();
    if(!name){showToast('請填寫姓名');return;}
    var c={id:uid(),name:name,phone:phone||'',taskScope:''};showLoading('新增中…');
    callGAS('saveContact',c).then(function(){
      state.contacts=state.contacts.concat([c]);
      var p=getProject(),tid=state.modalData.taskId;
      var upd=Object.assign({},p,{tasks:p.tasks.map(function(t){return t.id!==tid?t:Object.assign({},t,{contacts:(t.contacts||[]).concat([{id:c.id,name:c.name,phone:c.phone}])});})});
      updateLocalProject(upd);saveProjectToGAS(upd);hideLoading();showToast('已新增 ✓');setState({modal:'taskContacts',modalData:{taskId:tid}});
    }).catch(function(){hideLoading();showToast('新增失敗');});
  });
  onAll('.btn-remove-task-contact','click',function(e){
    var cid=e.currentTarget.dataset.cid,p=getProject(),tid=state.modalData.taskId;
    var upd=Object.assign({},p,{tasks:p.tasks.map(function(t){return t.id!==tid?t:Object.assign({},t,{contacts:(t.contacts||[]).filter(function(c){return c.id!==cid;})});})});
    updateLocalProject(upd);saveProjectToGAS(upd);setState({modal:'taskContacts',modalData:{taskId:tid}});showToast('已移除');
  });

  // Materials
  onAll('.btn-materials','click',function(e){setState({modal:'materials',modalData:{taskId:e.currentTarget.dataset.tid}});});
  on('#btnAddMaterial','click',function(){
    var scope=qs('#matScope')&&qs('#matScope').value.trim(),material=qs('#matMaterial')&&qs('#matMaterial').value.trim(),note=qs('#matNote')&&qs('#matNote').value.trim();
    if(!scope||!material){showToast('請填寫適用範圍與材質');return;}
    var p=getProject(),tid=state.modalData.taskId,m={id:uid(),scope:scope,material:material,note:note||''};
    var upd=Object.assign({},p,{tasks:p.tasks.map(function(t){return t.id!==tid?t:Object.assign({},t,{materials:(t.materials||[]).concat([m])});})});
    updateLocalProject(upd);saveProjectToGAS(upd);setState({modal:'materials',modalData:{taskId:tid}});showToast('已加入 ✓');
  });
  onAll('.btn-del-material','click',function(e){
    var midx=parseInt(e.currentTarget.dataset.midx),p=getProject(),tid=state.modalData.taskId;
    var upd=Object.assign({},p,{tasks:p.tasks.map(function(t){return t.id!==tid?t:Object.assign({},t,{materials:(t.materials||[]).filter(function(_,i){return i!==midx;})});})});
    updateLocalProject(upd);saveProjectToGAS(upd);setState({modal:'materials',modalData:{taskId:tid}});showToast('已刪除');
  });

  on('#btnSaveContact','click',function(){});// prevent double bind
}

// ── Init ─────────────────────────────────────────
function init(){
  showLoading('載入資料中…');
  Promise.all([
    callGAS('getAllData',{}).catch(function(){return[];}),
    callGAS('getAllContacts',{}).catch(function(){return[];})
  ]).then(function(results){
    state.projects=results[0]||[];state.contacts=results[1]||[];
    hideLoading();render();
  });
}
init();
</script>
</body>
</html>
